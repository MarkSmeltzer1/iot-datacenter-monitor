mqtt:
  broker: "localhost"
  port: 1883
  topic: "datacenter/sensors"

influxdb:
  url: "http://localhost:8086"
  token: "your-influxdb-token"
  org: "your-org"
  bucket: "datacenter_metrics"

simulation:
  interval_seconds: 1
  hotspot_rotation_records: 1000

thresholds:
  hotspot_temp_c: 30.0
  min_temp_c: 15.0
  max_temp_c: 45.0
  min_humidity_pct: 20.0
  max_humidity_pct: 80.0
  min_cpu_load_pct: 0.0
  max_cpu_load_pct: 100.0

logging:
  log_file: "logs/project.log"
  level: "INFO"